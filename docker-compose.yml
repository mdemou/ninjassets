name: ninjasset-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: ninjasset-dev-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-ninjasset_dev}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - ninjasset-dev-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-server:
    image: redis:7.4.0-alpine
    container_name: redis-server
    ports:
      - "6379:6379"
    environment:
      - REDIS_PASSWORD=your_secure_password
    command:
      [
        "redis-server",
        "--requirepass",
        "your_secure_password",
        "--appendonly",
        "yes",
      ]
    volumes:
      - ninjasset-dev-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "your_secure_password", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  qdrant:
    image: docker.io/qdrant/qdrant:latest
    container_name: qdrant-server
    restart: always
    ports:
      - 6333:6333 # REST API
      - 6334:6334 # gRPC
    volumes:
      - ninjasset-dev-qdrant-data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      # The qdrant image ships no wget/curl, so use a bash TCP probe on the REST port.
      test: ["CMD", "bash", "-c", "cat < /dev/null > /dev/tcp/localhost/6333"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  aiagent:
    image: ghcr.io/mdemou/ninjasset-aiagent:latest
    container_name: ninjasset-dev-aiagent
    env_file:
      - aiagent/.env
    environment:
      QDRANT_URL: http://qdrant:6333
      HF_HOME: /models/hf
    ports:
      - "8000:8000"
    volumes:
      # Host HF cache → container HF_HOME (set HF_CACHE_DIR in .env to override).
      - ${HF_CACHE_DIR:-${HOME}/.cache/huggingface}:/models/hf
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 300s
    restart: unless-stopped

  backend:
    image: ghcr.io/mdemou/ninjasset-backend:latest
    container_name: ninjasset-dev-backend
    env_file:
      - backend/.env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis-server
      DATABASE_URL: postgres://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-ninjasset_dev}
      AI_AGENT_URL: http://aiagent:8000
    ports:
      - "${PORT:-3001}:3001"
    volumes:
      - ninjasset-dev-backend-uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis-server:
        condition: service_healthy
      aiagent:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: ghcr.io/mdemou/ninjasset-frontend:latest
    container_name: ninjasset-dev-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  ninjasset-dev-pgdata:
  ninjasset-dev-redis-data:
  ninjasset-dev-qdrant-data:
  ninjasset-dev-backend-uploads:
