name: Release

# Build and publish production Docker images on version tags.
# Push a tag like `v1.0.0` to trigger this workflow, or run it manually
# from the Actions tab and supply the version to publish.
# E2E runs on branch pushes and PRs via ci.yml, not on release tags.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version/tag to build & publish, e.g. v0.2.1 (must be an existing ref)"
        required: true

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish Docker images
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: backend
            image: ninjasset-backend
          - name: frontend
            context: frontend
            image: ninjasset-frontend
          - name: aiagent
            context: aiagent
            image: ninjasset-aiagent

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.version || github.ref }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}},value=${{ github.event.inputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.event.inputs.version }}
            type=semver,pattern={{major}},value=${{ github.event.inputs.version }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
